<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio | Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Stylesheet.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="portfolio-layout">
        <a class="home-link" href="index.html" aria-label="Home">⌂</a>

        <nav class="top-nav">
          <a href="about.html">About me</a>
          <a href="skills.html">Skills</a>
          <a href="portfolio.html">Portfolio</a>
          <a class="nav-btn active" href="contact.html">CONTACT ME</a>
        </nav>

        <section class="left-panel">
          <h3>Contact Me</h3>
          <p>
            Silakan isi form di sebelah kanan untuk menghubungi saya. Saya akan
            membalas pesan Anda secepat mungkin.
          </p>
        </section>

        <section class="right-panel contact-wrap">
          <h1>Send Message</h1>
          <form action="#" method="post">
            <div class="field">
              <label for="name">Enter your name*</label>
              <input id="name" name="name" type="text" required />
            </div>
            <div class="field">
              <label for="email">Enter your email*</label>
              <input id="email" name="email" type="email" required />
            </div>
            <div class="field">
              <label for="phone">Phone number*</label>
              <input id="phone" name="phone" type="tel" required />
            </div>
            <div class="field">
              <label for="message">Your message*</label>
              <textarea id="message" name="message" required></textarea>
            </div>
            <button class="submit-btn" type="submit">SUBMIT</button>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
